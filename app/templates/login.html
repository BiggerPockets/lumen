<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumen — Sign in</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <span class="text-3xl font-bold text-indigo-600 tracking-tight">Lumen</span>
      <p class="text-sm text-gray-500 mt-1">Claude Code Analytics</p>
    </div>

    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
      <h1 class="text-lg font-semibold text-gray-900 mb-6">Sign in to your dashboard</h1>

      {% if error %}
      <div class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-4">
        <div>
          <label for="api_key" class="block text-sm font-medium text-gray-700 mb-1">API key</label>
          <input
            id="api_key"
            name="api_key"
            type="password"
            required
            autofocus
            placeholder="Paste your API key"
            class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
          />
        </div>
        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2 rounded-lg transition-colors"
        >
          Sign in
        </button>
      </form>

      <p class="mt-4 text-center text-xs text-gray-400">
        Don't have an org yet? <a href="/setup" class="text-indigo-500 hover:underline">Create one</a>
      </p>
    </div>
  </div>
</body>
</html>
